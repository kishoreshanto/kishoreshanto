<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- DNS Prefetch for external resources -->
		<link rel="dns-prefetch" href="//fonts.googleapis.com" />
		<link rel="dns-prefetch" href="//fonts.gstatic.com" />
		<link rel="dns-prefetch" href="//router.huggingface.co" />

		<!-- Preconnect to critical external origins -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<!-- Resource hints for better performance -->
		<meta http-equiv="x-dns-prefetch-control" content="on" />

		%sveltekit.head%

		<style>
			#app-loader {
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: flex;
				align-items: center;
				justify-content: center;
				background: rgb(244, 229, 199);
				color: #973c00;
				transition:
					opacity 250ms ease,
					visibility 250ms ease;
			}
			#app-loader.hidden {
				opacity: 0;
				visibility: hidden;
			}
			.spinner {
				width: 40px;
				height: 40px;
				border-radius: 9999px;
				border: 3px solid #6b7280;
				border-top-color: #973c00;
				animation: spin 0.9s linear infinite;
			}
			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}
		</style>
	</head>

	<body data-sveltekit-preload-data="hover">
		<!-- App splash loader: shows instantly, hides after Svelte 5 app mounts -->
		<div id="app-loader" aria-live="polite" aria-busy="true" role="status">
			<div class="progress" aria-hidden="true"></div>
			<div class="grid gap-4 place-items-center text-center">
				<div class="spinner" aria-hidden="true"></div>
				<div class="font-lora flex flex-col">
					<p class="text-amber-800 font-bold" style="font-size: 4rem;">Hello!</p>
					<p class="text-amber-700" style="font-size: 2rem;">Almost there, Thank you for your patience!</p>
				</div>
			</div>
		</div>
		<noscript>
			<style>
				/* If JS is disabled, don't block content with the loader */
				#app-loader {
					display: none !important;
				}
			</style>
		</noscript>

		<script>
			// Safety fallback: hide loader after 5s in case Svelte never mounts.
			// The primary hide is handled by +layout.svelte onMount.
			setTimeout(function () {
				var el = document.getElementById('app-loader');
				if (el && !el.classList.contains('hidden')) {
					el.classList.add('hidden');
					setTimeout(function () { try { el.remove(); } catch (e) {} }, 320);
				}
			}, 5000);
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
