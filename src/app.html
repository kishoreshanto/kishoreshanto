<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_back_ios"
		/>
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- DNS Prefetch for external resources -->
		<link rel="dns-prefetch" href="//fonts.googleapis.com" />
		<link rel="dns-prefetch" href="//fonts.gstatic.com" />
		<link rel="dns-prefetch" href="//router.huggingface.co" />

		<!-- Preconnect to critical external origins -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<!-- Resource hints for better performance -->
		<meta http-equiv="x-dns-prefetch-control" content="on" />

		%sveltekit.head%

		<style>
			html,
			body {
				margin: 0;
			}

			#app-loader {
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: grid;
				place-items: center;
				overflow: hidden;
				background:
					radial-gradient(circle at 50% 36%, rgba(255, 234, 206, 0.18), transparent 34%),
					linear-gradient(180deg, #1d120b 0%, #4d2913 100%);
				color: #fff7ea;
				transition:
					opacity 180ms ease,
					visibility 180ms ease;
			}

			#app-loader.hidden {
				opacity: 0;
				visibility: hidden;
			}

			.app-loader__beam {
				position: absolute;
				inset: 50% auto auto 50%;
				width: min(70vw, 28rem);
				aspect-ratio: 1;
				transform: translate(-50%, -50%);
				border-radius: 50%;
				background: radial-gradient(circle, rgba(255, 213, 160, 0.28) 0%, transparent 68%);
				filter: blur(34px);
				pointer-events: none;
			}

			.app-loader__canvas {
				position: absolute;
				inset: 0;
				pointer-events: none;
			}

			.app-loader__content {
				position: relative;
				z-index: 1;
				display: grid;
				justify-items: center;
				gap: 0.85rem;
				width: min(86vw, 30rem);
				padding: 2rem 1.25rem;
				text-align: center;
			}

			.app-loader__eyebrow {
				margin: 0;
				font:
					600 1rem/1.2 'JetBrains Mono',
					'SFMono-Regular',
					Consolas,
					monospace;
				letter-spacing: 0.3em;
				text-transform: uppercase;
				color: rgba(255, 230, 195, 0.72);
			}

			.app-loader__title {
				margin: 0;
				font-family: 'Lora', serif;
				font-size: clamp(2.75rem, 9vw, 4.75rem);
				font-weight: 600;
				line-height: 0.95;
				letter-spacing: 0.3rem;
				text-wrap: balance;
			}

			.app-loader__subtitle {
				margin: 0;
				/* max-width: 24rem; */
				font-size: 1.3rem;
				font-family: 'Lora', serif;
				color: rgba(255, 239, 216, 0.82);
			}

			.app-loader__meter {
				position: relative;
				width: min(68vw, 16rem);
				height: 2px;
				margin-top: 0.4rem;
				overflow: hidden;
				border-radius: 999px;
				background: rgba(255, 235, 203, 0.18);
			}

			.app-loader__meter span {
				position: absolute;
				inset: 0;
				transform-origin: left center;
				transform: scaleX(0);
				background: linear-gradient(90deg, #ffcf8a 0%, #fff1d5 100%);
				animation: loader-meter 1200ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
			}

			.app-loader__assistive {
				position: absolute;
				width: 1px;
				height: 1px;
				padding: 0;
				margin: -1px;
				overflow: hidden;
				clip: rect(0, 0, 0, 0);
				white-space: nowrap;
				border: 0;
			}

			@keyframes loader-meter {
				from {
					transform: scaleX(0);
				}
				to {
					transform: scaleX(1);
				}
			}

			@media (prefers-reduced-motion: reduce) {
				.app-loader__meter span {
					animation: none;
					transform: scaleX(1);
				}
			}
		</style>
	</head>

	<body data-sveltekit-preload-data="hover">
		<div id="app-loader" aria-live="polite" aria-busy="true" role="status">
			<div class="app-loader__beam" aria-hidden="true"></div>
			<div id="app-loader-canvas" class="app-loader__canvas" aria-hidden="true"></div>
			<div class="app-loader__content">
				<p class="app-loader__eyebrow">Kishore Shanto</p>
				<h1 class="app-loader__title">Hello</h1>
				<p class="app-loader__subtitle">Almost there, Thank you for your patience!</p>
				<div class="app-loader__meter" aria-hidden="true">
					<span></span>
				</div>
			</div>
			<p class="app-loader__assistive">Preparing the site experience.</p>
		</div>

		<noscript>
			<style>
				#app-loader {
					display: none !important;
				}
			</style>
		</noscript>

		<script>
			(function () {
				var loader = document.getElementById('app-loader');
				if (loader && !loader.dataset.startedAt) {
					loader.dataset.startedAt = String(Date.now());
				}

				setTimeout(function () {
					var el = document.getElementById('app-loader');
					if (el && !el.classList.contains('hidden')) {
						el.classList.add('hidden');
						el.setAttribute('aria-busy', 'false');
						setTimeout(function () {
							try {
								el.remove();
							} catch (e) {}
						}, 320);
					}
				}, 4000);
			})();
		</script>

		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
