<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<link
			rel="preload"
			as="style"
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_back_ios"
		/>
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_back_ios"
		/>
		<link
			rel="preload"
			as="style"
			href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=EB+Garamond:wght@400&family=JetBrains+Mono:wght@300;400;500;600;700&family=Lora:wght@400;500;700&display=swap"
		/>
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=EB+Garamond:wght@400&family=JetBrains+Mono:wght@300;400;500;600;700&family=Lora:wght@400;500;700&display=swap"
		/>
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- DNS Prefetch for external resources -->
		<link rel="dns-prefetch" href="//fonts.googleapis.com" />
		<link rel="dns-prefetch" href="//fonts.gstatic.com" />
		<link rel="dns-prefetch" href="//router.huggingface.co" />

		<!-- Preconnect to critical external origins -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="preload" href="/fonts/IvyJournal-Regular.otf" as="font" type="font/otf" crossorigin />
		<link rel="preload" href="/fonts/IvyJournal-Bold.otf" as="font" type="font/otf" crossorigin />

		<!-- Resource hints for better performance -->
		<meta http-equiv="x-dns-prefetch-control" content="on" />

		%sveltekit.head%

		<style>
			html,
			body {
				margin: 0;
			}

			body[data-loader-active='true'] {
				overflow: hidden;
			}

			#app-loader {
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: grid;
				place-items: center;
				overflow: hidden;
				background:
					radial-gradient(circle at 50% 36%, rgba(255, 234, 206, 0.18), transparent 34%),
					linear-gradient(180deg, #1d120b 0%, #4d2913 100%);
				color: #fff7ea;
				transition:
					opacity 220ms ease,
					visibility 220ms ease;
			}

			#app-loader.hidden {
				opacity: 0;
				visibility: hidden;
			}

			.app-loader__beam {
				position: absolute;
				inset: 50% auto auto 50%;
				width: min(70vw, 28rem);
				aspect-ratio: 1;
				transform: translate(-50%, -50%);
				border-radius: 50%;
				background: radial-gradient(circle, rgba(255, 213, 160, 0.28) 0%, transparent 68%);
				filter: blur(34px);
				pointer-events: none;
				animation: loader-beam 3.6s ease-in-out infinite;
			}

			.app-loader__content {
				position: relative;
				z-index: 1;
				display: grid;
				justify-items: center;
				gap: 0.9rem;
				width: min(86vw, 32rem);
				padding: 2rem 1.5rem;
				text-align: center;
			}

			.app-loader__eyebrow {
				margin: 0;
				font:
					600 1rem/1.2 'JetBrains Mono',
					'SFMono-Regular',
					Consolas,
					monospace;
				letter-spacing: 0.3em;
				text-transform: uppercase;
				color: rgba(255, 230, 195, 0.72);
			}

			.app-loader__title {
				margin: 0;
				font-family: 'Lora', serif;
				font-size: clamp(2.75rem, 9vw, 4.75rem);
				font-weight: 600;
				line-height: 0.95;
				letter-spacing: 0.3rem;
				text-wrap: balance;
			}

			.app-loader__subtitle {
				margin: 0;
				max-width: 24rem;
				font-size: 1.3rem;
				font-family: 'Lora', serif;
				color: rgba(255, 239, 216, 0.82);
			}

			.app-loader__meter {
				position: relative;
				width: min(68vw, 16rem);
				height: 3px;
				margin-top: 0.4rem;
				overflow: hidden;
				border-radius: 999px;
				background: rgba(255, 235, 203, 0.14);
				box-shadow: inset 0 0 0 1px rgba(255, 240, 218, 0.04);
			}

			.app-loader__meter span {
				position: absolute;
				top: 0;
				bottom: 0;
				left: 0;
				width: 42%;
				transform: translateX(-130%);
				background: linear-gradient(90deg, #ffcf8a 0%, #fff1d5 100%);
				box-shadow: 0 0 18px rgba(255, 219, 171, 0.45);
				animation: loader-meter 1.45s cubic-bezier(0.22, 1, 0.36, 1) infinite;
			}

			@keyframes loader-meter {
				0% {
					transform: translateX(-130%);
				}
				65%,
				100% {
					transform: translateX(250%);
				}
			}

			@keyframes loader-beam {
				0%,
				100% {
					opacity: 0.42;
					transform: translate(-50%, -50%) scale(0.94);
				}
				50% {
					opacity: 0.7;
					transform: translate(-50%, -50%) scale(1.06);
				}
			}

			@media (prefers-reduced-motion: reduce) {

				.app-loader__meter span {
					width: 100%;
					transform: translateX(0);
				}
			}
		</style>
	</head>

	<body
		data-sveltekit-preload-code="eager"
		data-sveltekit-preload-data="hover"
		data-loader-active="true"
	>
		<div id="app-loader" aria-live="polite" aria-busy="true" role="status">
			<div class="app-loader__content">
				<p class="app-loader__eyebrow">Kishore Shanto</p>
				<h1 class="app-loader__title">Hello</h1>
				<p class="app-loader__subtitle">Almost there, Thank you for your patience!</p>
				<div class="app-loader__meter" aria-hidden="true">
					<span></span>
				</div>
			</div>
		</div>

		<noscript>
			<style>
				#app-loader {
					display: none !important;
				}
			</style>
		</noscript>

		<script>
			(function () {
				var loader = document.getElementById('app-loader');
				if (loader && !loader.dataset.startedAt) {
					loader.dataset.startedAt = String(Date.now());
				}

				setTimeout(function () {
					var el = document.getElementById('app-loader');
					if (el && !el.classList.contains('hidden')) {
						document.body.removeAttribute('data-loader-active');
						el.classList.add('hidden');
						el.setAttribute('aria-busy', 'false');
						setTimeout(function () {
							try {
								el.remove();
							} catch (e) {}
						}, 420);
					}
				}, 12000);
			})();
		</script>

		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
