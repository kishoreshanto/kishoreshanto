<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>%sveltekit.status% | Website error</title>
		<style>
			* {
				box-sizing: border-box;
			}

			html,
			body {
				margin: 0;
				min-height: 100%;
			}

			body {
				display: grid;
				place-items: center;
				padding: 2rem;
				color: #5f4932;
				font-family: serif;
				text-align: center;
			}

			.card {
				position: relative;
				overflow: hidden;
				border: 2px solid rgb(196 154 60 / 0.42);
				border-radius: 2rem;
				padding: clamp(1.5rem, 3vw, 3rem);
			}

			.meta {
				display: inline-flex;
				margin-top: 1rem;
				border: 1px solid rgb(44 24 16 / 0.12);
				border-radius: 999px;
				background: rgb(255 210 117 / 0.34);
				padding: 0.75rem 1rem;
				color: rgb(44 24 16 / 0.82);
				font-family: monospace;
				font-size: 0.78rem;
				font-weight: 600;
				letter-spacing: 0.26em;
				text-transform: uppercase;
			}
		</style>
	</head>
	<body>
		<main style="width: min(100%, 58rem)">
			<section class="card">
				<div class="meta">Code %sveltekit.status%</div>
				<h1 style="margin: 1.25rem 0 0; font-size: clamp(2.25rem, 5vw, 4rem); line-height: 1.05">
					The request could not be completed. Please try again later...
				</h1>
				<p
					style="
						margin: 1rem 0 0;
						font-family: serif;
						font-size: clamp(1.25rem, 2vw, 1.7rem);
						line-height: 1.45;
					"
				>
					%sveltekit.error.message%
				</p>
			</section>
		</main>
	</body>
</html>
