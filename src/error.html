<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>%sveltekit.status% | Portfolio error</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Lora:wght@400;600;700&display=swap"
		/>
		<style>
			:root {
				color-scheme: light;
				--amber: #a86700;
				--bronze: #845522;
				--cream: #f5edd9;
				--gold: #c49a3c;
				--honey: #ffd275;
				--ink: #2c1810;
				--ivory: #fffaf0;
				--taupe: #8b7355;
			}

			* {
				box-sizing: border-box;
			}

			html,
			body {
				margin: 0;
				min-height: 100%;
			}

			body {
				display: grid;
				place-items: center;
				padding: 2rem;
				background:
					radial-gradient(circle at top right, rgb(255 210 117 / 0.18), transparent 28%),
					radial-gradient(circle at top left, rgb(196 154 60 / 0.14), transparent 24%),
					linear-gradient(180deg, #faf6ee 0%, #eef1ef 40%, #fff 100%);
				color: #5f4932;
				font-family: 'Lora', serif;
			}

			main {
				width: min(100%, 58rem);
			}

			.card {
				position: relative;
				overflow: hidden;
				border: 1px solid rgb(196 154 60 / 0.42);
				border-radius: 2rem;
				background:
					radial-gradient(circle at top right, rgb(255 210 117 / 0.24), transparent 34%),
					linear-gradient(145deg, rgb(255 250 240 / 0.9), rgb(245 237 217 / 0.84));
				box-shadow: 0 20px 40px -28px rgb(44 24 16 / 0.18);
				padding: clamp(1.5rem, 3vw, 3rem);
			}

			.card::after {
				content: '';
				position: absolute;
				inset: 0 auto auto 0;
				height: 1px;
				width: 100%;
				background: linear-gradient(90deg, transparent, rgb(196 154 60 / 0.55), transparent);
			}

			.kicker,
			.meta {
				font-family: 'JetBrains Mono', monospace;
				font-size: 0.78rem;
				font-weight: 600;
				letter-spacing: 0.26em;
				text-transform: uppercase;
			}

			.kicker {
				color: rgb(132 85 34 / 0.82);
			}

			.meta {
				display: inline-flex;
				margin-top: 1rem;
				border: 1px solid rgb(44 24 16 / 0.12);
				border-radius: 999px;
				background: rgb(255 210 117 / 0.34);
				padding: 0.75rem 1rem;
				color: rgb(44 24 16 / 0.82);
			}

			h1 {
				margin: 1.25rem 0 0;
				color: var(--ink);
				font-size: clamp(2.25rem, 5vw, 4rem);
				line-height: 1.05;
			}

			p {
				margin: 1rem 0 0;
				font-family: 'Crimson Text', serif;
				font-size: clamp(1.25rem, 2vw, 1.7rem);
				line-height: 1.45;
			}

			.actions {
				display: flex;
				flex-wrap: wrap;
				gap: 0.75rem;
				margin-top: 1.75rem;
			}

			a {
				border-radius: 999px;
				padding: 0.95rem 1.2rem;
				font-family: 'JetBrains Mono', monospace;
				font-size: 0.78rem;
				font-weight: 600;
				letter-spacing: 0.18em;
				text-decoration: none;
				text-transform: uppercase;
				transition:
					transform 180ms ease,
					background-color 180ms ease,
					color 180ms ease,
					border-color 180ms ease;
			}

			a:hover {
				transform: translateY(-1px);
			}

			.primary {
				border: 1px solid rgb(132 85 34 / 0.24);
				background: var(--amber);
				color: var(--ivory);
			}

			.primary:hover {
				background: var(--bronze);
			}

			.secondary {
				border: 1px solid rgb(132 85 34 / 0.24);
				background: rgb(255 250 240 / 0.84);
				color: var(--ink);
			}

			.secondary:hover {
				border-color: rgb(132 85 34 / 0.42);
				background: rgb(255 210 117 / 0.34);
			}
		</style>
	</head>
	<body>
		<main>
			<section class="card">
				<div class="kicker">Static fallback</div>
				<div class="meta">Code %sveltekit.status%</div>
				<h1>The request could not be completed.</h1>
				<p>%sveltekit.error.message%</p>
				<div class="actions">
					<a class="primary" href="/">Go home</a>
					<a class="secondary" href="/contact">Open contact</a>
				</div>
			</section>
		</main>
	</body>
</html>
